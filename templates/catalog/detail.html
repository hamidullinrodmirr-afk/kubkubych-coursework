{% extends 'base.html' %}{% block content %}<section class="section"><div class="container" id="product">Загрузка…</div></section>{% endblock %}{% block extra_js %}<script>API.get('/products/{{ product_id }}/').then(p=>{document.getElementById('product').innerHTML=`<img style="max-width:420px;width:100%;float:right;margin:0 0 24px 32px" src="${p.image_url}" alt="${p.name}"><h1>${p.name}</h1><p>${p.description}</p><p><b>Артикул:</b> ${p.article}<br><b>Серия:</b> ${p.category_detail.name}<br><b>Детали:</b> ${p.pieces}<br><b>Возраст:</b> ${p.age_min}–${p.age_max} лет</p><h2>${p.final_price} ₽</h2><p>${p.in_stock?'В наличии: '+p.stock:'Нет в наличии'}</p><button class="btn btn--green" onclick="add(${p.id})" ${p.in_stock?'':'disabled'}>Добавить в корзину</button>`});function add(id){API.post('/cart/items/',{product:id,quantity:1}).then(r=>alert(r.ok?'Набор добавлен в корзину':'Войдите в аккаунт или проверьте остаток'))}</script>{% endblock %}
