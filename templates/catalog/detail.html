{% extends 'base.html' %}{% block content %}<section class="section"><div class="container" id="product">Загрузка…</div></section>{% endblock %}{% block extra_js %}<script>API.get('/products/{{ product_id }}/').then(p=>{document.getElementById('product').innerHTML=`<h1>${p.name}</h1><p>${p.description}</p><p>${p.category_detail.name} · ${p.pieces} деталей · возраст ${p.age_min}–${p.age_max}</p><h2>${p.final_price} ₽</h2><p>${p.in_stock?'В наличии: '+p.stock:'Нет в наличии'}</p><button class="btn btn--green" onclick="add(${p.id})" ${p.in_stock?'':'disabled'}>В корзину</button>`});function add(id){API.post('/cart/items/',{product:id,quantity:1}).then(r=>alert(r.ok?'Добавлено в корзину':'Сначала войдите или проверьте остаток'))}</script>{% endblock %}
