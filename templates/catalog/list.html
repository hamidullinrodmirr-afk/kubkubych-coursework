{% extends 'base.html' %}{% block title %}Каталог — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container"><div class="section__header"><h1>Каталог наборов</h1><p>Используйте фильтры: серия, возраст, цена, наличие и скидки.</p></div><div class="search-bar"><input id="search" class="search-input" placeholder="Название или артикул"><button id="find" class="btn btn--green">Найти</button></div><div class="cards-grid" id="products"></div></div></section>{% endblock %}{% block extra_js %}<script>async function load(){let q=document.getElementById('search').value;let d=await API.get('/products/?search='+encodeURIComponent(q));let a=d?.results||d||[];document.getElementById('products').innerHTML=a.map(p=>`<article class="card"><div class="card__body"><span class="chip">${p.category_detail.name}</span><div class="card__title">${p.name}</div><p>${p.article} · ${p.pieces} деталей · ${p.age_min}–${p.age_max} лет</p><div class="card__footer"><b>${p.final_price} ₽</b><a class="btn btn--sm btn--navy" href="/catalog/${p.id}/">Открыть</a></div></div></article>`).join('')||'<p>Ничего не найдено.</p>'}document.getElementById('find').onclick=load;load()</script>{% endblock %}
