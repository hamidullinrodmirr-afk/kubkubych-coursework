{% extends 'base.html' %}{% block title %}Каталог — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container"><div class="section__header"><span class="eyebrow">Более 20 наборов</span><h1>Каталог</h1><p>Выберите любимую серию, возраст строителя и подходящий бюджет.</p></div><div class="catalog-toolbar"><input id="search" class="search-input" placeholder="Название или артикул"><select id="category" class="form-control"><option value="">Все серии</option></select><select id="availability" class="form-control"><option value="">Любое наличие</option><option value="true">В наличии</option></select><select id="sort" class="form-control"><option value="name">Сначала по названию</option><option value="price">Сначала дешевле</option><option value="-price">Сначала дороже</option></select><button id="find" class="btn btn--green">Показать</button></div><p class="catalog-count" id="count"></p><div class="cards-grid" id="products"></div></div></section>{% endblock %}{% block extra_js %}<script>const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));async function setup(){let d=await API.get('/products/categories/');(d?.results||d||[]).forEach(c=>document.getElementById('category').insertAdjacentHTML('beforeend',`<option value="${c.id}">${esc(c.name)}</option>`));load()}async function load(){let q=new URLSearchParams({search:document.getElementById('search').value,ordering:document.getElementById('sort').value});if(document.getElementById('category').value)q.set('category',document.getElementById('category').value);if(document.getElementById('availability').value)q.set('in_stock','true');let d=await API.get('/products/?'+q);let a=d?.results||d||[];document.getElementById('count').textContent=`Найдено наборов: ${d?.count??a.length}`;document.getElementById('products').innerHTML=a.map(p=>`<article class="card"><img class="card__image" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy"><div class="card__body"><span class="chip">${esc(p.category_detail.name)}</span><div class="card__title">${esc(p.name)}</div><p>${esc(p.article)} · ${p.pieces} деталей · ${p.age_min}–${p.age_max} лет</p><div class="card__footer"><b>${p.final_price} ₽</b><a class="btn btn--sm btn--navy" href="/catalog/${p.id}/">Открыть</a></div></div></article>`).join('')||'<p>По этим условиям ничего не найдено. Попробуйте изменить фильтры.</p>'}document.getElementById('find').onclick=load;setup()</script>{% endblock %}
