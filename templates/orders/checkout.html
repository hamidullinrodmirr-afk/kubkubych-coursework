{% extends 'base.html' %}{% block content %}<section class="section"><div class="container"><h1>Оформление заказа</h1><p>Минимальная сумма заказа — 500 ₽.</p><form id="form"><input name="recipient_name" placeholder="Получатель" required><input name="phone" placeholder="Телефон" required><textarea name="delivery_address" placeholder="Город, улица, дом, индекс" required></textarea><select name="payment_method"><option value="card">Картой онлайн</option><option value="cash">При получении</option></select><button class="btn btn--green">Подтвердить заказ</button></form><p id="result"></p></div></section>{% endblock %}{% block extra_js %}<script>document.getElementById('form').onsubmit=async e=>{e.preventDefault();let o=Object.fromEntries(new FormData(e.target));let r=await API.post('/orders/',o);document.getElementById('result').textContent=r.ok?'Заказ оформлен!':'Не удалось оформить заказ: проверьте данные и корзину.'}</script>{% endblock %}
