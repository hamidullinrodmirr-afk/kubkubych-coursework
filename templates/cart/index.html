{% extends 'base.html' %}{% block content %}<section class="section"><div class="container"><h1>Корзина</h1><div id="cart">Загрузка…</div></div></section>{% endblock %}{% block extra_js %}<script>API.get('/cart/items/').then(d=>{if(!d){document.getElementById('cart').innerHTML='Войдите, чтобы увидеть корзину.';return}document.getElementById('cart').innerHTML=d.items.map(i=>`<p><b>${i.product_detail.name}</b> — ${i.quantity} шт. — ${i.subtotal} ₽</p>`).join('')+`<h2>Итого: ${d.total} ₽</h2><a class="btn btn--green" href="/checkout/">Оформить</a>`})</script>{% endblock %}
