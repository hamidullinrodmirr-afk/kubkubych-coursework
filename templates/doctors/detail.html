{% extends 'base.html' %}
{% block title %}Врач{% endblock %}

{% block content %}
<section class="hero hero--teal">
    <div class="container">
        <div class="hero__inner">
            <div class="hero__content">
                <h1 id="heroTitle">Ветеринар</h1>
                <p id="heroSubtitle"></p>
            </div>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="doctor-info" id="doctorInfo">
            <div class="loading"><div class="spinner"></div>Загрузка...</div>
        </div>

        <div style="margin-top: 48px;">
            <h2 class="section-title">Оказываемые услуги</h2>
            <div class="cards-grid" id="servicesGrid"></div>
        </div>

        <div style="margin-top: 64px;">
            <h2 class="section-title">Отзывы</h2>
            <div class="reviews-grid" id="reviewsGrid"></div>
        </div>

        <div style="text-align: center; margin-top: 48px;">
            <a href="/appointment/?doctor={{ doctor_id }}" class="btn btn--green">Записаться на приём</a>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
const doctorId = {{ doctor_id }};
const defaultPhotos = [
    'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=400&h=450&fit=crop',
    'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=400&h=450&fit=crop',
    'https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=400&h=450&fit=crop',
    'https://images.unsplash.com/photo-1594824476967-48c8b964ac31?w=400&h=450&fit=crop',
    'https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=400&h=450&fit=crop',
    'https://images.unsplash.com/photo-1651008376811-b90baee60c1f?w=400&h=450&fit=crop',
];

function pluralYears(n) {
    const mod = n % 10, mod100 = n % 100;
    if (mod === 1 && mod100 !== 11) return n + ' год';
    if (mod >= 2 && mod <= 4 && (mod100 < 12 || mod100 > 14)) return n + ' года';
    return n + ' лет';
}

async function loadDoctor() {
    const doc = await API.get(`/doctors/${doctorId}/`);
    if (!doc) {
        window.location.replace('/doctors/');
        return;
    }

    document.getElementById('heroTitle').textContent = doc.full_name;
    document.getElementById('heroSubtitle').textContent = doc.specialties.map(s => s.name).join(', ');
    document.title = `${doc.full_name} — PetCare`;

    const photo = doc.photo || defaultPhotos[(doctorId - 1) % defaultPhotos.length];

    document.getElementById('doctorInfo').innerHTML = `
        <img class="doctor-info__photo"
            src="${esc(photo)}"
            alt="${esc(doc.full_name)}"
            onerror="this.src='${defaultPhotos[(doctorId - 1) % defaultPhotos.length]}'">
        <div class="doctor-info__details">
            <h2>${esc(doc.full_name)}</h2>
            <div class="doctor-info__specialty">${esc(doc.specialties.map(s => s.name).join(', '))}</div>
            <div class="doctor-info__stats">
                <div class="doctor-info__stat">
                    <div class="doctor-info__stat-value">★ ${Number(doc.avg_rating || 0).toFixed(1)}</div>
                    <div class="doctor-info__stat-label">Рейтинг</div>
                </div>
                <div class="doctor-info__stat">
                    <div class="doctor-info__stat-value">${doc.reviews_count || 0}</div>
                    <div class="doctor-info__stat-label">Отзывов</div>
                </div>
                <div class="doctor-info__stat">
                    <div class="doctor-info__stat-value">${pluralYears(doc.experience_years)}</div>
                    <div class="doctor-info__stat-label">Стаж</div>
                </div>
                <div class="doctor-info__stat">
                    <div class="doctor-info__stat-value">${Number(doc.consultation_price).toLocaleString('ru-RU')} ₽</div>
                    <div class="doctor-info__stat-label">Консультация</div>
                </div>
            </div>
            ${doc.bio ? `<p class="doctor-info__bio">${esc(doc.bio)}</p>` : ''}
            ${doc.education ? `<p class="doctor-info__bio"><strong>Образование:</strong> ${esc(doc.education)}</p>` : ''}
            ${doc.schedules && doc.schedules.length ? `
                <h4 style="margin: 16px 0 8px;">Расписание</h4>
                <ul class="info-list">
                    ${doc.schedules.map(s => `<li>${esc(s.day_display)}: ${esc(s.start_time.slice(0,5))} — ${esc(s.end_time.slice(0,5))}</li>`).join('')}
                </ul>
            ` : ''}
            <a href="/appointment/?doctor=${doctorId}" class="btn btn--green" style="margin-top:20px;">Записаться на приём</a>
        </div>
    `;
}

async function loadReviews() {
    const data = await API.get(`/doctors/${doctorId}/reviews/`);
    const grid = document.getElementById('reviewsGrid');
    const reviews = data?.results || data || [];

    if (reviews.length === 0) {
        grid.innerHTML = '<p style="color:var(--gray);">Пока нет отзывов</p>';
        return;
    }

    grid.innerHTML = reviews.map((r, i) => `
        <div class="review-card reveal" style="--i:${i % 4}">
            <div class="review-card__header">
                <span class="review-card__author">${esc(r.author_name)}</span>
                <span class="review-card__rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
            </div>
            <p class="review-card__text">${esc(r.text)}</p>
            <div class="review-card__date">${esc(formatDate(r.created_at))}</div>
        </div>
    `).join('');
    revealScan(grid);
}

async function loadDoctorServices() {
    const doc = await API.get(`/doctors/${doctorId}/`);
    if (!doc || !doc.specialties) return;

    const specIds = doc.specialties.map(s => s.id);
    const grid = document.getElementById('servicesGrid');
    const allServices = await API.get('/services/');
    const items = (allServices?.results || []).filter(svc =>
        specIds.includes(svc.specialty_detail?.id || svc.specialty)
    );

    if (items.length === 0) {
        grid.innerHTML = '<p style="color:var(--gray);">Нет привязанных услуг</p>';
        return;
    }

    grid.innerHTML = items.map((svc, i) => `
        <div class="card reveal" style="--i:${i % 4}">
            <div class="card__body">
                <div class="card__title">${esc(svc.name)}</div>
                <div class="card__subtitle">${esc(svc.duration_minutes)} мин.</div>
                <div class="card__footer">
                    <span class="card__price">${Number(svc.price).toLocaleString('ru-RU')} ₽</span>
                    <a href="/appointment/?doctor=${doctorId}&service=${svc.id}" class="btn btn--sm btn--navy">Записаться</a>
                </div>
            </div>
        </div>
    `).join('');
    revealScan(grid);
}

loadDoctor();
loadDoctorServices();
loadReviews();
</script>
{% endblock %}
