{% extends 'base.html' %}{% block title %}Личный кабинет — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container"><h1>Личный кабинет</h1><div id="profile">Загрузка…</div><h2 style="margin-top:35px">Мои заказы</h2><div id="orders"></div></div></section>{% endblock %}{% block extra_js %}<script>Promise.all([API.get('/auth/me/'),API.get('/orders/')]).then(([p,o])=>{if(!p){location.href='/login/';return}document.getElementById('profile').innerHTML=`<p><b>${p.first_name} ${p.last_name}</b><br>${p.email}<br>${p.phone||'Телефон не указан'}</p>`;let a=o?.results||o||[];document.getElementById('orders').innerHTML=a.map(x=>`<p>Заказ №${x.id} — ${x.total} ₽ · ${x.status_display}</p>`).join('')||'<p>Заказов пока нет. <a href="/catalog/">Выбрать набор</a></p>'})</script>{% endblock %}
