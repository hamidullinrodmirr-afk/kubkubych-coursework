{% extends 'base.html' %}
{% block title %}Личный кабинет{% endblock %}

{% block content %}
<section class="section" style="background: var(--bg-light); min-height: calc(100vh - 200px);">
    <div class="container">
        <h2 style="margin-bottom: 30px; color: var(--navy);">Личный кабинет</h2>

        <div class="profile-grid">
            <div class="profile-sidebar">
                <div class="profile-avatar" id="avatarBox">👤</div>
                <div class="profile-name" id="profileName">Загрузка...</div>
                <div class="profile-role" id="profileRole"></div>
                <ul class="profile-nav">
                    <li class="active" onclick="showTab('appointments')">Мои записи</li>
                    <li onclick="showTab('pets')">Мои питомцы</li>
                    <li onclick="showTab('settings')">Настройки</li>
                </ul>
            </div>

            <div class="profile-content" id="tabContent">
                <div class="loading"><div class="spinner"></div>Загрузка...</div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let currentTab = 'appointments';
let userProfile = null;

async function init() {
    if (!API.isAuthenticated()) {
        window.location.href = '/login/';
        return;
    }
    userProfile = await API.getProfile();
    if (!userProfile) { window.location.href = '/login/'; return; }

    document.getElementById('profileName').textContent = `${userProfile.last_name} ${userProfile.first_name}`;
    const roles = { client: 'Клиент', veterinarian: 'Ветеринар', admin: 'Администратор' };
    document.getElementById('profileRole').textContent = roles[userProfile.role] || userProfile.role;

    showTab('appointments');
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.profile-nav li').forEach(li => li.classList.remove('active'));
    document.querySelectorAll('.profile-nav li').forEach(li => {
        if (li.textContent.includes(tab === 'appointments' ? 'записи' : tab === 'pets' ? 'питомцы' : 'Настройки'))
            li.classList.add('active');
    });

    if (tab === 'appointments') loadAppointments();
    else if (tab === 'pets') loadPets();
    else if (tab === 'settings') showSettings();
}

async function loadAppointments() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await API.get('/appointments/');
    const items = data?.results || [];

    if (items.length === 0) {
        content.innerHTML = '<p style="color:var(--gray);text-align:center;padding:40px;">У вас пока нет записей. <a href="/appointment/" style="color:var(--teal);font-weight:600;">Записаться на приём</a></p>';
        return;
    }

    content.innerHTML = `
        <h3 style="margin-bottom:16px;">Мои записи</h3>
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th>Дата</th><th>Время</th><th>Врач</th><th>Услуга</th><th>Питомец</th><th>Статус</th><th></th>
                </tr></thead>
                <tbody>
                    ${items.map(a => `
                        <tr>
                            <td>${formatDate(a.date)}</td>
                            <td>${a.time_slot?.slice(0,5) || ''}</td>
                            <td>${a.doctor_name}</td>
                            <td>${a.service_name}</td>
                            <td>${a.pet_name}</td>
                            <td><span class="status-badge status-badge--${a.status}">${a.status_display}</span></td>
                            <td>${a.status !== 'cancelled' && a.status !== 'completed'
                                ? `<button class="btn btn--sm btn--outline" onclick="cancelAppt(${a.id})">Отменить</button>`
                                : ''}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

async function cancelAppt(id) {
    if (!confirm('Отменить запись?')) return;
    const resp = await API.post(`/appointments/${id}/cancel/`, {});
    if (resp && resp.ok) loadAppointments();
}

async function loadPets() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await API.get('/pets/');
    const items = data?.results || [];

    let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h3>Мои питомцы</h3>
            <button class="btn btn--sm btn--green" onclick="showAddPetForm()">Добавить</button>
        </div>
        <div id="petFormContainer"></div>
    `;

    if (items.length === 0) {
        html += '<p style="color:var(--gray);text-align:center;padding:40px;">У вас пока нет питомцев</p>';
    } else {
        html += '<div class="cards-grid">' + items.map(p => `
            <div class="card">
                <div class="card__body">
                    <div class="card__title">${p.name}</div>
                    <div class="card__subtitle">${p.species_display} · ${p.breed || 'Без породы'}</div>
                    <p style="font-size:0.85rem;color:var(--gray);">Возраст: ${p.age} мес. · Вес: ${p.weight} кг</p>
                    ${p.health_notes ? `<p style="font-size:0.85rem;color:var(--gray);margin-top:4px;">${p.health_notes}</p>` : ''}
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button class="btn btn--sm btn--outline" onclick="deletePet(${p.id})">Удалить</button>
                    </div>
                </div>
            </div>
        `).join('') + '</div>';
    }

    content.innerHTML = html;
}

function showAddPetForm() {
    document.getElementById('petFormContainer').innerHTML = `
        <div style="background:var(--bg-light);border-radius:12px;padding:20px;margin-bottom:20px;">
            <div class="form-row">
                <div class="form-group"><label>Кличка</label><input class="form-control" id="petName" required></div>
                <div class="form-group"><label>Вид</label>
                    <select class="form-control" id="petSpecies">
                        <option value="cat">Кошка</option><option value="dog">Собака</option>
                        <option value="bird">Птица</option><option value="rodent">Грызун</option>
                        <option value="reptile">Рептилия</option><option value="other">Другое</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Порода</label><input class="form-control" id="petBreed"></div>
                <div class="form-group"><label>Возраст (мес.)</label><input type="number" class="form-control" id="petAge" min="0" max="360" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Вес (кг)</label><input type="number" step="0.01" class="form-control" id="petWeight" min="0.01" max="200" required></div>
                <div class="form-group"><label>Особенности здоровья</label><input class="form-control" id="petHealth"></div>
            </div>
            <button class="btn btn--sm btn--green" onclick="addPet()">Сохранить</button>
            <button class="btn btn--sm btn--outline" onclick="document.getElementById('petFormContainer').innerHTML=''">Отмена</button>
        </div>
    `;
}

async function addPet() {
    const data = {
        name: document.getElementById('petName').value,
        species: document.getElementById('petSpecies').value,
        breed: document.getElementById('petBreed').value,
        age: parseInt(document.getElementById('petAge').value),
        weight: document.getElementById('petWeight').value,
        health_notes: document.getElementById('petHealth').value,
    };
    const resp = await API.post('/pets/', data);
    if (resp && resp.ok) loadPets();
    else {
        const err = await resp?.json();
        alert(Object.values(err || {}).flat().join('. ') || 'Ошибка');
    }
}

async function deletePet(id) {
    if (!confirm('Удалить питомца?')) return;
    await API.delete(`/pets/${id}/`);
    loadPets();
}

function showSettings() {
    const content = document.getElementById('tabContent');
    content.innerHTML = `
        <h3 style="margin-bottom:20px;">Настройки профиля</h3>
        <div class="form-row">
            <div class="form-group"><label>Фамилия</label><input class="form-control" id="setLastName" value="${userProfile.last_name}"></div>
            <div class="form-group"><label>Имя</label><input class="form-control" id="setFirstName" value="${userProfile.first_name}"></div>
        </div>
        <div class="form-group"><label>Телефон</label><input class="form-control" id="setPhone" value="${userProfile.phone || ''}"></div>
        <div class="form-group"><label>Email</label><input class="form-control" value="${userProfile.email}" disabled></div>
        <button class="btn btn--green" onclick="saveProfile()" style="margin-top:16px;">Сохранить</button>
        <div id="settingsAlerts" style="margin-top:16px;"></div>
    `;
}

async function saveProfile() {
    const resp = await API.patch('/auth/me/', {
        first_name: document.getElementById('setFirstName').value,
        last_name: document.getElementById('setLastName').value,
        phone: document.getElementById('setPhone').value,
    });
    if (resp && resp.ok) {
        userProfile = await resp.json();
        document.getElementById('profileName').textContent = `${userProfile.last_name} ${userProfile.first_name}`;
        showAlert(document.getElementById('settingsAlerts'), 'Профиль обновлён', 'success');
    }
}

init();
</script>
{% endblock %}
