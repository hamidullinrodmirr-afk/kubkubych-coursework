{% extends 'base.html' %}
{% block title %}Личный кабинет — КубКубыч{% endblock %}
{% block content %}
<section class="section"><div class="container"><span class="eyebrow">Ваш аккаунт</span><h1>Личный кабинет</h1><div id="profile" class="profile-card">Загрузка…</div><div class="section__header profile-orders-title"><span class="eyebrow">История покупок</span><h2>Мои заказы</h2><p>Откройте заказ, чтобы посмотреть состав, адрес и текущий статус.</p></div><div id="orders" class="order-list"></div></div></section>
{% endblock %}
{% block extra_js %}<script>
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
Promise.all([API.get('/auth/me/'),API.get('/orders/')]).then(([profile,orders])=>{if(!profile){location.href='/login/';return}document.getElementById('profile').innerHTML=`<b>${escapeHtml(profile.first_name)} ${escapeHtml(profile.last_name)}</b><span>${escapeHtml(profile.email)}</span><span>${escapeHtml(profile.phone||'Телефон не указан')}</span>`;const items=orders?.results||orders||[];document.getElementById('orders').innerHTML=items.map(order=>`<a class="order-card" href="/orders/${order.id}/"><div><span class="order-card__number">Заказ №${order.id}</span><span class="order-card__date">${new Date(order.created_at).toLocaleDateString('ru-RU')}</span></div><div class="order-card__right"><b>${order.total} ₽</b><span class="order-status">${escapeHtml(order.status_display)}</span><span class="order-card__link">Подробнее →</span></div></a>`).join('')||'<div class="empty-state"><h3>Заказов пока нет</h3><p>В каталоге уже ждут наборы для первой покупки.</p><a class="btn btn--green" href="/catalog/">Перейти в каталог</a></div>'})
</script>{% endblock %}
