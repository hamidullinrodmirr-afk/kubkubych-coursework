{% extends 'base.html' %}
{% block title %}Личный кабинет{% endblock %}

{% block content %}
<section class="section" style="background: var(--bg-light); min-height: calc(100vh - 200px);">
    <div class="container">
        <h2 style="margin-bottom: 30px; color: var(--navy);">Личный кабинет</h2>

        <div class="profile-grid">
            <div class="profile-sidebar">
                <div class="profile-avatar" id="avatarBox">👤</div>
                <div class="profile-name" id="profileName">Загрузка...</div>
                <div class="profile-role" id="profileRole"></div>
                <ul class="profile-nav">
                    <li class="active" onclick="showTab('appointments')">Мои записи</li>
                    <li onclick="showTab('pets')">Мои питомцы</li>
                    <li onclick="showTab('settings')">Настройки</li>
                </ul>
            </div>

            <div class="profile-content" id="tabContent">
                <div class="loading"><div class="spinner"></div>Загрузка...</div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let currentTab = 'appointments';
let userProfile = null;

async function init() {
    if (!API.isAuthenticated()) {
        window.location.href = '/login/';
        return;
    }
    userProfile = await API.getProfile();
    if (!userProfile) { window.location.href = '/login/'; return; }

    document.getElementById('profileName').textContent = `${userProfile.last_name} ${userProfile.first_name}`;
    const roles = { client: 'Клиент', veterinarian: 'Ветеринар', admin: 'Администратор' };
    document.getElementById('profileRole').textContent = roles[userProfile.role] || userProfile.role;

    showTab('appointments');
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.profile-nav li').forEach(li => li.classList.remove('active'));
    document.querySelectorAll('.profile-nav li').forEach(li => {
        if (li.textContent.includes(tab === 'appointments' ? 'записи' : tab === 'pets' ? 'питомцы' : 'Настройки'))
            li.classList.add('active');
    });

    if (tab === 'appointments') loadAppointments();
    else if (tab === 'pets') loadPets();
    else if (tab === 'settings') showSettings();
}

async function loadAppointments() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await API.get('/appointments/');
    const items = data?.results || [];

    if (items.length === 0) {
        content.innerHTML = '<p style="color:var(--gray);text-align:center;padding:40px;">У вас пока нет записей. <a href="/appointment/" style="color:var(--teal);font-weight:600;">Записаться на приём</a></p>';
        return;
    }

    content.innerHTML = `
        <h3 style="margin-bottom:16px;">Мои записи</h3>
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th>Дата</th><th>Время</th><th>Врач</th><th>Услуга</th><th>Питомец</th><th>Статус</th><th></th>
                </tr></thead>
                <tbody>
                    ${items.map(a => `
                        <tr>
                            <td>${esc(formatDate(a.date))}</td>
                            <td>${esc(a.time_slot?.slice(0,5) || '')}</td>
                            <td>${esc(a.doctor_name)}</td>
                            <td>${esc(a.service_name)}</td>
                            <td>${esc(a.pet_name)}</td>
                            <td><span class="status-badge status-badge--${esc(a.status)}">${esc(a.status_display)}</span></td>
                            <td>${a.status !== 'cancelled' && a.status !== 'completed'
                                ? `<button class="btn btn--sm btn--outline" onclick="cancelAppt(${a.id})">Отменить</button>`
                                : ''}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

async function cancelAppt(id) {
    if (!confirm('Вы уверены, что хотите отменить запись?')) return;
    try {
        const resp = await API.post(`/appointments/${id}/cancel/`, {});
        if (resp && resp.ok) {
            loadAppointments();
        } else {
            let msg = 'Не удалось отменить запись';
            try { const err = await resp?.json(); msg = Object.values(err).flat().join('. ') || msg; } catch(e) {}
            alert(msg);
        }
    } catch (e) {
        alert('Ошибка соединения с сервером');
    }
}

async function loadPets() {
    const content = document.getElementById('tabContent');
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const data = await API.get('/pets/');
    const items = data?.results || [];

    let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h3>Мои питомцы</h3>
            <button class="btn btn--sm btn--green" onclick="showAddPetForm()">Добавить</button>
        </div>
        <div id="petFormContainer"></div>
    `;

    if (items.length === 0) {
        html += '<p style="color:var(--gray);text-align:center;padding:40px;">У вас пока нет питомцев</p>';
    } else {
        html += '<div class="cards-grid">' + items.map((p, i) => `
            <div class="card reveal" style="--i:${i % 4}">
                <div class="card__body">
                    <div class="card__title">${esc(p.name)}</div>
                    <div class="card__subtitle">${esc(p.species_display)} · ${esc(p.breed || 'Без породы')}</div>
                    <p style="font-size:0.85rem;color:var(--muted);">Возраст: ${esc(p.age)} мес. · Вес: ${esc(p.weight)} кг</p>
                    ${p.health_notes ? `<p style="font-size:0.85rem;color:var(--muted);margin-top:4px;">${esc(p.health_notes)}</p>` : ''}
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button class="btn btn--sm btn--outline" onclick="deletePet(${p.id})">Удалить</button>
                    </div>
                </div>
            </div>
        `).join('') + '</div>';
    }

    content.innerHTML = html;
    if (typeof revealScan === 'function') revealScan(content);
}

function showAddPetForm() {
    document.getElementById('petFormContainer').innerHTML = `
        <div style="background:var(--bg-light);border-radius:12px;padding:20px;margin-bottom:20px;">
            <div class="form-row">
                <div class="form-group"><label>Кличка</label><input class="form-control" id="petName" required></div>
                <div class="form-group"><label>Вид</label>
                    <select class="form-control" id="petSpecies">
                        <option value="cat">Кошка</option><option value="dog">Собака</option>
                        <option value="bird">Птица</option><option value="rodent">Грызун</option>
                        <option value="reptile">Рептилия</option><option value="other">Другое</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Порода</label><input class="form-control" id="petBreed"></div>
                <div class="form-group"><label>Возраст (мес.)</label><input type="number" class="form-control" id="petAge" min="0" max="360" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Вес (кг)</label><input type="number" step="0.01" class="form-control" id="petWeight" min="0.01" max="200" required></div>
                <div class="form-group"><label>Особенности здоровья</label><input class="form-control" id="petHealth"></div>
            </div>
            <button class="btn btn--sm btn--green" onclick="addPet()">Сохранить</button>
            <button class="btn btn--sm btn--outline" onclick="document.getElementById('petFormContainer').innerHTML=''">Отмена</button>
        </div>
    `;
}

async function addPet() {
    const name = document.getElementById('petName').value.trim();
    const age = document.getElementById('petAge').value;
    const weight = document.getElementById('petWeight').value;

    const container = document.getElementById('petFormContainer');
    let alertBox = document.getElementById('petFormAlerts');
    if (!alertBox) {
        alertBox = document.createElement('div');
        alertBox.id = 'petFormAlerts';
        container.querySelector('div').prepend(alertBox);
    }
    alertBox.innerHTML = '';

    if (!name) { showAlert(alertBox, 'Укажите кличку питомца'); return; }
    if (!age || age < 0) { showAlert(alertBox, 'Укажите корректный возраст'); return; }
    if (!weight || weight <= 0) { showAlert(alertBox, 'Укажите корректный вес'); return; }

    const data = {
        name: name,
        species: document.getElementById('petSpecies').value,
        breed: document.getElementById('petBreed').value,
        age: parseInt(age),
        weight: weight,
        health_notes: document.getElementById('petHealth').value,
    };

    try {
        const resp = await API.post('/pets/', data);
        if (resp && resp.ok) {
            showAlert(alertBox, 'Питомец успешно добавлен!', 'success');
            setTimeout(() => loadPets(), 1000);
        } else {
            let msg = 'Ошибка при добавлении питомца';
            try {
                const err = await resp?.json();
                if (err) msg = Object.values(err).flat().join('. ');
            } catch(e) {}
            showAlert(alertBox, msg);
        }
    } catch (e) {
        showAlert(alertBox, 'Ошибка соединения с сервером');
    }
}

async function deletePet(id) {
    if (!confirm('Вы уверены, что хотите удалить питомца?')) return;
    try {
        const resp = await API.delete(`/pets/${id}/`);
        if (resp && (resp.ok || resp.status === 204)) {
            loadPets();
        } else {
            alert('Не удалось удалить питомца');
        }
    } catch (e) {
        alert('Ошибка соединения с сервером');
    }
}

function showSettings() {
    const content = document.getElementById('tabContent');
    content.innerHTML = `
        <h3 style="margin-bottom:20px;">Настройки профиля</h3>
        <div class="form-row">
            <div class="form-group"><label>Фамилия</label><input class="form-control" id="setLastName" value="${esc(userProfile.last_name)}"></div>
            <div class="form-group"><label>Имя</label><input class="form-control" id="setFirstName" value="${esc(userProfile.first_name)}"></div>
        </div>
        <div class="form-group"><label>Телефон</label><input class="form-control" id="setPhone" value="${esc(userProfile.phone || '')}"></div>
        <div class="form-group"><label>Email</label><input class="form-control" value="${esc(userProfile.email)}" disabled></div>
        <button class="btn btn--green" onclick="saveProfile()" style="margin-top:16px;">Сохранить</button>
        <div id="settingsAlerts" style="margin-top:16px;"></div>
    `;
}

async function saveProfile() {
    const alerts = document.getElementById('settingsAlerts');
    alerts.innerHTML = '';
    const firstName = document.getElementById('setFirstName').value.trim();
    const lastName = document.getElementById('setLastName').value.trim();
    const phone = document.getElementById('setPhone').value.trim();

    if (!firstName || !lastName) {
        showAlert(alerts, 'Имя и фамилия обязательны для заполнения');
        return;
    }

    if (phone && !/^[\d\+\-\(\)\s]{7,20}$/.test(phone)) {
        showAlert(alerts, 'Некорректный формат телефона');
        return;
    }

    try {
        const resp = await API.patch('/auth/me/', {
            first_name: firstName,
            last_name: lastName,
            phone: phone,
        });
        if (resp && resp.ok) {
            userProfile = await resp.json();
            document.getElementById('profileName').textContent = `${userProfile.last_name} ${userProfile.first_name}`;
            showAlert(alerts, 'Профиль успешно обновлён', 'success');
            updateAuthUI();
        } else {
            let msg = 'Не удалось сохранить профиль';
            try {
                const err = await resp?.json();
                if (err) {
                    const messages = [];
                    for (const [key, val] of Object.entries(err)) {
                        const fieldNames = {first_name:'Имя', last_name:'Фамилия', phone:'Телефон'};
                        const label = fieldNames[key] || key;
                        messages.push(`${label}: ${Array.isArray(val) ? val.join(', ') : val}`);
                    }
                    if (messages.length) msg = messages.join('. ');
                }
            } catch (e) {}
            showAlert(alerts, msg);
        }
    } catch (e) {
        showAlert(alerts, 'Ошибка соединения с сервером');
    }
}

init();
</script>
{% endblock %}
