{% extends 'base.html' %}
{% load static %}
{% block title %}Услуги{% endblock %}

{% block content %}
<section class="hero hero--navy">
    <div class="container">
        <div class="hero__inner">
            <div class="hero__content">
                <h1>Наши<br>Услуги</h1>
                <p>Полный спектр ветеринарных услуг для здоровья и счастья ваших питомцев.</p>
            </div>
            <div class="hero__image">
                <img src="{% static 'img/illustrations/hero-services.svg' %}" alt="Ветеринарные услуги">
            </div>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Название услуги">
            <button class="search-btn" onclick="loadServices()"><svg class="icon"><use href="#ic-search"/></svg>Найти</button>
        </div>

        <div class="layout-sidebar">
            <aside>
                <div class="specialties-box">
                    <div class="specialties-box__title">Поиск услуги</div>
                    <ul class="specialties-list" id="specList">
                        <li class="active" id="allSpecsBtn">Все услуги</li>
                    </ul>
                </div>
            </aside>

            <div>
                <div class="cards-grid" id="servicesGrid">
                    <div class="loading"><div class="spinner"></div>Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let currentSpecId = '';

const servicePhotos = [
    'https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1548767797-d8c844163c4c?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1583337130417-13571c0aa26d?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1450778869180-41d0601e046e?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1574158622682-e40e69881006?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1425082661507-6af4ae4af61f?w=400&h=300&fit=crop',
    'https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=400&h=300&fit=crop',
];

function setActiveSpec(el) {
    document.querySelectorAll('#specList li').forEach(li => li.classList.remove('active'));
    el.classList.add('active');
}

async function loadSpecialties() {
    const data = await API.get('/doctors/specialties/');
    if (!data || !data.results) return;
    const list = document.getElementById('specList');
    const allBtn = document.getElementById('allSpecsBtn');

    allBtn.addEventListener('click', () => {
        setActiveSpec(allBtn);
        currentSpecId = '';
        loadServices();
    });

    data.results.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s.name;
        li.addEventListener('click', () => {
            setActiveSpec(li);
            currentSpecId = s.id;
            loadServices();
        });
        list.appendChild(li);
    });
}

async function loadServices() {
    const grid = document.getElementById('servicesGrid');
    const search = document.getElementById('searchInput').value.trim();
    let url = '/services/';
    const params = [];
    if (currentSpecId) params.push(`specialty=${currentSpecId}`);
    if (search) params.push(`search=${encodeURIComponent(search)}`);
    if (params.length) url += '?' + params.join('&');

    grid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка...</div>';

    try {
        const data = await API.get(url);
        if (!data || !data.results || data.results.length === 0) {
            grid.innerHTML = '<p style="text-align:center;color:var(--gray);padding:40px;">Услуги не найдены</p>';
            return;
        }

        const tints = ['brand', 'orange', 'coral', 'green', 'violet'];
        grid.innerHTML = data.results.map((svc, i) => `
            <div class="card reveal" style="--i:${i % 4}">
                <img class="card__image"
                    src="${esc(svc.photo) || servicePhotos[i % servicePhotos.length]}"
                    alt="${esc(svc.name)}"
                    onerror="this.src='${servicePhotos[i % servicePhotos.length]}'">
                <div class="card__body">
                    ${svc.specialty_detail?.name ? `<span class="chip chip--${tints[i % tints.length]}">${esc(svc.specialty_detail.name)}</span>` : ''}
                    <div class="card__title">${esc(svc.name)}</div>
                    <div class="card__subtitle">${esc(svc.duration_minutes)} мин.</div>
                    ${svc.description ? `<p style="font-size:0.85rem;color:var(--muted);">${esc(svc.description.slice(0,110))}${svc.description.length > 110 ? '…' : ''}</p>` : ''}
                    <div class="card__footer">
                        <span class="card__price">от ${Number(svc.price).toLocaleString('ru-RU')} ₽</span>
                        <a href="/appointment/?service=${svc.id}" class="btn btn--sm btn--navy">Записаться</a>
                    </div>
                </div>
            </div>
        `).join('');
        revealScan(grid);
    } catch (e) {
        grid.innerHTML = '<p style="text-align:center;color:var(--gray);padding:40px;">Ошибка загрузки</p>';
    }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadServices();
});

loadSpecialties();
loadServices();
</script>
{% endblock %}
