{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Регистрация</h2>
        <p class="subtitle">Создайте аккаунт для записи на приём</p>

        <div id="alerts"></div>

        <form id="registerForm" onsubmit="return handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Иванов" required>
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Иван" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" class="form-control" id="phone" placeholder="+7-999-999-99-99">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Минимум 8 символов" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="Повторите пароль" required>
                </div>
            </div>
            <button type="submit" class="btn btn--green btn--full" style="margin-top:16px;">Зарегистрироваться</button>
        </form>

        <div class="auth-link">
            Уже есть аккаунт? <a href="/login/">Войти</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleRegister(e) {
    e.preventDefault();
    const data = {
        last_name: document.getElementById('lastName').value,
        first_name: document.getElementById('firstName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        password_confirm: document.getElementById('passwordConfirm').value,
    };

    const resp = await API.register(data);
    if (resp.ok) {
        await API.login(data.email, data.password);
        window.location.href = '/';
    } else {
        const err = await resp.json();
        const msg = Object.values(err).flat().join('. ') || 'Ошибка регистрации';
        showAlert(document.getElementById('alerts'), msg);
    }
    return false;
}
</script>
{% endblock %}
