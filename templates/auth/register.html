{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Регистрация</h2>
        <p class="subtitle">Создайте аккаунт для записи на приём</p>

        <div id="alerts"></div>

        <form id="registerForm" onsubmit="return handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Иванов" required>
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Иван" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" class="form-control" id="phone" placeholder="+7-999-999-99-99">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Минимум 8 символов" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="Повторите пароль" required>
                </div>
            </div>
            <button type="submit" class="btn btn--green btn--full" style="margin-top:16px;">Зарегистрироваться</button>
        </form>

        <div class="auth-divider"><span>или</span></div>

        <div class="oauth-buttons">
            <a href="/api/auth/oauth/google/" class="btn btn--oauth btn--google">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Войти через Google
            </a>
            <a href="/api/auth/oauth/vk/" class="btn btn--oauth btn--vk">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M12.785 16.241s.288-.032.436-.194c.136-.148.132-.427.132-.427s-.02-1.304.587-1.496c.598-.188 1.368 1.259 2.184 1.814.616.42 1.084.328 1.084.328l2.178-.03s1.14-.07.6-.964c-.044-.073-.316-.661-1.624-1.868-1.37-1.264-1.186-1.06.464-3.246.904-1.198 1.327-2.134 1.206-2.482-.116-.332-.83-.244-.83-.244l-2.45.015s-.182-.025-.316.056c-.132.079-.216.264-.216.264s-.39 1.038-.908 1.92c-1.094 1.862-1.532 1.96-1.712 1.846-.418-.268-.314-1.076-.314-1.65 0-1.792.272-2.54-.528-2.734-.266-.064-.46-.106-1.138-.114-.87-.008-1.606.004-2.024.208-.278.136-.492.436-.362.454.162.022.528.098.722.362.25.34.242 1.104.242 1.104s.144 2.11-.336 2.372c-.33.18-.782-.188-1.752-1.87-.496-.862-.87-1.816-.87-1.816s-.072-.176-.2-.27c-.156-.114-.372-.15-.372-.15l-2.328.016s-.35.01-.478.162c-.114.136-.01.416-.01.416s1.826 4.272 3.892 6.426c1.894 1.974 4.046 1.844 4.046 1.844h.976z"/></svg>
                Войти через ВКонтакте
            </a>
        </div>

        <div class="auth-link">
            Уже есть аккаунт? <a href="/login/">Войти</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleRegister(e) {
    e.preventDefault();
    const data = {
        last_name: document.getElementById('lastName').value,
        first_name: document.getElementById('firstName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        password_confirm: document.getElementById('passwordConfirm').value,
    };

    const resp = await API.register(data);
    if (resp.ok) {
        await API.login(data.email, data.password);
        window.location.href = '/';
    } else {
        const err = await resp.json();
        const msg = Object.values(err).flat().join('. ') || 'Ошибка регистрации';
        showAlert(document.getElementById('alerts'), msg);
    }
    return false;
}
</script>
{% endblock %}
