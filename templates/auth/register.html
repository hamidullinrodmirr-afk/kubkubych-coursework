{% extends 'base.html' %}{% block title %}Регистрация — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container" style="max-width:560px"><h1>Регистрация</h1><p>Создайте аккаунт, чтобы добавлять наборы в корзину, оформлять заказы и сохранять избранное.</p><form id="register"><input name="first_name" placeholder="Имя" required><input name="last_name" placeholder="Фамилия" required><input name="email" type="email" placeholder="Email" required><input name="phone" placeholder="Телефон"><input name="password" type="password" placeholder="Пароль (минимум 8 символов)" required><input name="password_confirm" type="password" placeholder="Повторите пароль" required><button class="btn btn--green">Создать аккаунт</button></form><p id="message"></p></div></section>{% endblock %}{% block extra_js %}<script>document.getElementById('register').onsubmit=async e=>{e.preventDefault();let r=await API.register(Object.fromEntries(new FormData(e.target)));document.getElementById('message').textContent=r.ok?'Аккаунт создан. Теперь можно войти.':'Проверьте поля формы и пароль.';if(r.ok)setTimeout(()=>location.href='/login/',700)}</script>{% endblock %}
