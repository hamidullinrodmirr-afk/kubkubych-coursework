{% extends 'base.html' %}{% block title %}Регистрация — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container auth-wrap"><div class="auth-card"><span class="eyebrow">Новый аккаунт</span><h1>Создайте кабинет</h1><p>Сохраняйте интересные наборы, управляйте корзиной и отслеживайте заказы.</p><form id="register"><div class="form-row"><div class="form-group"><label for="first_name">Имя</label><input class="form-control" id="first_name" name="first_name" placeholder="Радмир" required></div><div class="form-group"><label for="last_name">Фамилия</label><input class="form-control" id="last_name" name="last_name" placeholder="Хамидуллин" required></div></div><div class="form-group"><label for="email">Email</label><input class="form-control" id="email" name="email" type="email" placeholder="you@example.com" required></div><div class="form-group"><label for="phone">Телефон</label><input class="form-control" id="phone" name="phone" placeholder="+7 999 000-00-00"></div><div class="form-row"><div class="form-group"><label for="password">Пароль</label><input class="form-control" id="password" name="password" type="password" placeholder="Минимум 8 символов" required></div><div class="form-group"><label for="password_confirm">Повторите пароль</label><input class="form-control" id="password_confirm" name="password_confirm" type="password" placeholder="Повторите пароль" required></div></div><button class="btn btn--green btn--wide">Создать аккаунт</button></form><p id="message" class="form-message"></p><p class="auth-switch">Уже есть аккаунт? <a href="/login/">Войти</a></p></div></div></section>{% endblock %}{% block extra_js %}<script>document.getElementById('register').onsubmit=async e=>{e.preventDefault();let r=await API.register(Object.fromEntries(new FormData(e.target))),m=document.getElementById('message');m.className='form-message '+(r.ok?'form-message--success':'form-message--error');m.textContent=r.ok?'Аккаунт создан. Теперь можно войти.':'Проверьте поля формы и пароль.';if(r.ok)setTimeout(()=>location.href='/login/',700)}</script>{% endblock %}
