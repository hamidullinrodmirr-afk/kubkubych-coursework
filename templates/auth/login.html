{% extends 'base.html' %}{% block title %}Вход — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container" style="max-width:560px"><h1>Вход</h1><p>Войдите, чтобы управлять корзиной, заказами и избранным.</p><form id="login"><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Пароль" required><button class="btn btn--green">Войти</button></form><p id="message"></p><p>Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p></div></section>{% endblock %}{% block extra_js %}<script>document.getElementById('login').onsubmit=async e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await API.login(d.email,d.password);document.getElementById('message').textContent=r.ok?'Готово! Переходим в кабинет…':'Неверный email или пароль.';if(r.ok)setTimeout(()=>location.href='/profile/',500)}</script>{% endblock %}
