{% extends 'base.html' %}{% block title %}Вход — КубКубыч{% endblock %}{% block content %}<section class="section"><div class="container auth-wrap"><div class="auth-card"><span class="eyebrow">С возвращением</span><h1>Вход в кабинет</h1><p>Войдите, чтобы продолжить покупки и посмотреть заказы.</p><form id="login"><div class="form-group"><label for="email">Email</label><input class="form-control" id="email" name="email" type="email" placeholder="you@example.com" required></div><div class="form-group"><label for="password">Пароль</label><input class="form-control" id="password" name="password" type="password" placeholder="Ваш пароль" required></div><button class="btn btn--green btn--wide">Войти</button></form><p id="message" class="form-message"></p><p class="auth-switch">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p></div></div></section>{% endblock %}{% block extra_js %}<script>document.getElementById('login').onsubmit=async e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await API.login(d.email,d.password),m=document.getElementById('message');m.className='form-message '+(r.ok?'form-message--success':'form-message--error');m.textContent=r.ok?'Готово! Переходим в кабинет…':'Неверный email или пароль.';if(r.ok)setTimeout(()=>location.href='/profile/',500)}</script>{% endblock %}
