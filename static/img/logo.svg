<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <style>
      .logo-fill { fill: #1A4E63; }
    </style>
  </defs>
  <!-- Rounded medical/veterinary cross -->
  <!-- Vertical bar of the cross -->
  <rect class="logo-fill" x="26" y="8" width="28" height="64" rx="10" ry="10"/>
  <!-- Horizontal bar of the cross -->
  <rect class="logo-fill" x="8" y="26" width="64" height="28" rx="10" ry="10"/>
  <!-- Paw print elements integrated into the cross -->
  <!-- Main pad (large oval at bottom-center of cross) -->
  <ellipse cx="40" cy="48" rx="7.5" ry="6" fill="white" opacity="0.95"/>
  <!-- Top-left toe -->
  <ellipse cx="30.5" cy="33" rx="3.8" ry="4.5" fill="white" opacity="0.95" transform="rotate(-10 30.5 33)"/>
  <!-- Top-right toe -->
  <ellipse cx="49.5" cy="33" rx="3.8" ry="4.5" fill="white" opacity="0.95" transform="rotate(10 49.5 33)"/>
  <!-- Middle-left toe -->
  <ellipse cx="34" cy="25" rx="3.2" ry="4" fill="white" opacity="0.95" transform="rotate(-20 34 25)"/>
  <!-- Middle-right toe -->
  <ellipse cx="46" cy="25" rx="3.2" ry="4" fill="white" opacity="0.95" transform="rotate(20 46 25)"/>
</svg>
